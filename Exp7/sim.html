<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pointers and Dynamic Memory Allocation Simulator</title>
<link rel="stylesheet" href="simulation.css">

<style>
.memory{
    display:flex;
    gap:15px;
    margin-top:10px;
    flex-wrap:wrap;
}
.mem-box{
    flex:1;
    min-width:180px;
    padding:15px;
    border:2px solid #4a90e2;
    border-radius:10px;
    text-align:center;
    background:#f8fbff;
    transition:.4s;
}
.mem-box.active{
    background:#4a90e2;
    color:#fff;
    transform:scale(1.05);
}
.pointer{
    border-color:#27ae60;
}
.dynamic{
    border-color:#e67e22;
}
#steps pre.active{
    background:#fff8d6;
    border-left:5px solid orange;
}
</style>

</head>
<body>

<div class="header">Pointers and Dynamic Memory Allocation Simulator</div>

<div class="main-container">

<div class="panel problem-panel">
<div class="panel-header">Simulation Controls</div>

<div class="panel-body">

<label>Variable Value :</label>
<input type="number" id="varValue" value="10">

<div class="button-row">
<button class="start" onclick="start()">Start</button>
<button class="next" onclick="nextStep()">Next</button>
<button class="reset" onclick="resetSim()">Reset</button>
</div>

</div>
</div>

<div class="panel step-panel">
<div class="panel-header">Step Execute</div>
<div class="panel-body" id="steps"></div>
</div>

<div class="panel result-panel">
<div class="panel-header">Memory Visualization</div>

<div class="panel-body" id="result">

<div class="memory">

<div class="mem-box" id="varBox">
<h3>Variable x</h3>
<p>Not Created</p>
</div>

<div class="mem-box pointer" id="ptrBox">
<h3>Pointer ptr</h3>
<p>NULL</p>
</div>

<div class="mem-box dynamic" id="dynBox">
<h3>Dynamic Memory</h3>
<p>Not Allocated</p>
</div>

</div>

</div>
</div>

</div>

<script src="ssc.js"></script>

</body>
</html>
