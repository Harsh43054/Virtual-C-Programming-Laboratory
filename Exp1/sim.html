<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Program Structure and Basic Syntax Explorer</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fb;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2c3e50;
}

.code-box{
    background:#1e1e1e;
    color:#fff;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-family: Consolas, monospace;
}

.highlight{
    background:yellow;
    color:black;
    padding:2px;
}

button{
    padding:10px 20px;
    margin:10px 5px;
    border:none;
    border-radius:5px;
    background:#4a90e2;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#357abd;
}

#explanation{
    margin-top:20px;
    padding:15px;
    background:#eef5ff;
    border-left:5px solid #4a90e2;
}
</style>
</head>

<body>

<div class="container">

<h1>C++ Program Structure and Basic Syntax Explorer</h1>

<p>
Click each component to understand the structure of a C++ program.
</p>

<div class="code-box" id="codeArea">
#include &lt;iostream&gt;<br>
using namespace std;<br><br>

int main()<br>
{<br>
&nbsp;&nbsp;&nbsp;&nbsp;cout &lt;&lt; "Hello World";<br>
&nbsp;&nbsp;&nbsp;&nbsp;return 0;<br>
}
</div>

<div style="margin-top:20px;">
<button onclick="showInfo(1)">Header File</button>
<button onclick="showInfo(2)">Namespace</button>
<button onclick="showInfo(3)">Main Function</button>
<button onclick="showInfo(4)">Output Statement</button>
<button onclick="showInfo(5)">Return Statement</button>
</div>

<div id="explanation">
Select any component to view its explanation.
</div>

</div>

<script>

function showInfo(step){

let text="";

switch(step){

case 1:
text="<b>#include &lt;iostream&gt;</b><br><br>This header file provides input and output functionality using cin and cout.";
break;

case 2:
text="<b>using namespace std;</b><br><br>Allows us to use standard library objects like cout and cin without writing std::.";
break;

case 3:
text="<b>int main()</b><br><br>The main() function is the entry point of every C++ program.";
break;

case 4:
text="<b>cout << \"Hello World\";</b><br><br>Displays output on the screen.";
break;

case 5:
text="<b>return 0;</b><br><br>Indicates successful execution of the program.";
break;
}

document.getElementById("explanation").innerHTML=text;
}

</script>

</body>
</html>
